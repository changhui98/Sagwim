## 운영 환경 전용 설정
spring:
  sql:
    init:
      mode: never
  flyway:
    # 운영: classpath:db/migration 루트만 스캔 → dev/ 서브폴더의 V2(개발 시드)는 자동 차단됨
    # 현재 운영 마이그레이션: V1(스키마 생성), V3(p_comment.image_url 추가)
  jpa:
    properties:
      hibernate:
        format_sql: false
        show_sql: false

## p6spy 비활성화 (운영 성능 보호)
decorator:
  datasource:
    p6spy:
      enable-logging: off

## 운영 로그 레벨
logging:
  level:
    root: warn
    web: warn
    com.peopleground: info
    org.flywaydb: info
